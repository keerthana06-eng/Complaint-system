<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Intelligent Complaint System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin: 0;
        }

        .container {
            margin-top: 80px;
            background: white;
            padding: 25px;
            width: 350px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
        }

        textarea {
            width: 90%;
            height: 80px;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }

        .high { color: red; }
        .medium { color: orange; }
        .low { color: green; }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📢 Complaint System</h1>

    <textarea id="complaint" placeholder="Enter your complaint..."></textarea>

    <br>
    <button onclick="analyze()">Submit</button>

    <div class="result" id="output"></div>

    <footer>
        Powered by AI | Impact Innovators
    </footer>
</div>

<script>
function analyze() {
    let text = document.getElementById("complaint").value.toLowerCase();

    let severity = "Low";
    let delay = "5-7 days";
    let colorClass = "low";

    if (text.includes("accident") || text.includes("fire") || text.includes("urgent")) {
        severity = "High";
        delay = "will take care Within 15 mins";
        colorClass = "high";
    } 
    else if (text.includes("garbage") || text.includes("water") || text.includes("delay")) {
        severity = "Medium";
        delay = "Cleaned within  1 day";
        colorClass = "medium";
    }

    document.getElementById("output").innerHTML =
        `<span class="${colorClass}">Severity: ${severity}</span><br>
         Expected Resolution: ${delay}`;
}
</script>

</body>
</html>
